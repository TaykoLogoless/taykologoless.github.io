<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaykoLogoless</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* PARTICLES */
.particle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: lime;
  border-radius: 50%;
  box-shadow: 0 0 10px lime;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* RAIN */
.rain {
  position: fixed;
  width: 2px;
  height: 20px;
  background: rgba(0,255,0,0.3);
  animation: rain 0.5s linear infinite;
}

@keyframes rain {
  from { transform: translateY(-100vh); }
  to { transform: translateY(100vh); }
}

/* NAVBAR */
nav {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  color: lime;
  text-shadow: 0 0 15px lime;
}

/* SECTIONS */
.section {
  padding: 40px;
  text-align: center;
}

h2 {
  color: lime;
  text-shadow: 0 0 10px lime;
}

/* SEARCH */
input {
  width: 60%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

/* CARDS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #111;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
  width: 200px;
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 20px lime;
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: lime;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>TaykoLogoless</nav>

<!-- SEARCH SECTION -->
<div class="section">
  <h2>Search Scenepacks</h2>
  <input type="text" id="searchInput" placeholder="Search player...">
</div>

<div class="container" id="container">

  <div class="card" data-name="justin jefferson">
    <img src="https://via.placeholder.com/200">
    <h3>Justin Jefferson</h3>
    <a href="#"><button>Download</button></a>
  </div>

</div>

<!-- HELP SECTION -->
<div class="section">
  <h2>Ask for Help</h2>
  <p>DM me for requests or help with scenepacks.</p>
</div>

<!-- SOCIALS -->
<div class="section">
  <h2>Our Socials</h2>
  <p>TikTok: @icy.zaelyn</p>
  <p>YouTube: TaykoLogoless</p>
</div>

<script>
/* SEARCH */
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("keyup", function() {
  const value = searchInput.value.toLowerCase();

  cards.forEach(card => {
    const name = card.getAttribute("data-name");

    if (name.includes(value)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
});

/* PARTICLES */
for (let i = 0; i < 40; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random()*5) + "s";
  document.body.appendChild(p);
}

/* RAIN */
for (let i = 0; i < 80; i++) {
  let r = document.createElement("div");
  r.className = "rain";
  r.style.left = Math.random() * 100 + "vw";
  r.style.animationDuration = (0.3 + Math.random()*0.5) + "s";
  document.body.appendChild(r);
}
</script>

</body>
</html>
